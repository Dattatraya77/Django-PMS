{% extends "layout1.html" %}
{% load static %}
{% load tz %}
{% block content %}

<style>
    .card-body {
        padding:0.5rem;
    }
    .container-fluid {
        padding-right: 15px !important;
        padding-left: 0px !important;
    }
    .buttons-html5 {
        padding:1px 6px !important;
    }
    .btn-sm{
        padding:0.25rem -0.5rem;
        line-height:0.5;
        border-radius:0rem;
        font-size: 13px;
    }
    .dropdown-menu {
        min-width:0rem;
        padding:0.3rem 2px;
        margin:0.125rem -200px 0px;
        height: 200px;
        overflow: auto;
    }
    sub {
        bottom : 0.1em;
    }
    .dropdown-divider {
        margin:0rem;
    }
    .col {
        padding-right:0px;
        padding-left:0px;
    }
    .row {
        flex-wrap:nowrap;
    }
</style>
<style>
    .highcharts-credits {
      display: none;
    }
    .highcharts-figure,
    .highcharts-data-table table {
        min-width: 310px;
        max-width: 800px;
        margin: 1em auto;
    }
    .highcharts-data-table table {
        font-family: Verdana, sans-serif;
        border-collapse: collapse;
        border: 1px solid #ebebeb;
        margin: 10px auto;
        text-align: center;
        width: 100%;
        max-width: 500px;
    }
    .highcharts-data-table caption {
        padding: 1em 0;
        font-size: 1.2em;
        color: #555;
    }
    .highcharts-data-table th {
        font-weight: 600;
        padding: 0.5em;
    }
    .highcharts-data-table td,
    .highcharts-data-table th,
    .highcharts-data-table caption {
        padding: 0.5em;
    }
    .highcharts-data-table thead tr,
    .highcharts-data-table tr:nth-child(even) {
        background: #f8f8f8;
    }
    .highcharts-data-table tr:hover {
        background: #f1f7ff;
    }
    tspan.highcharts-text-outline {
      stroke-width: 0px;
    }
    .highcharts-label text {
      font-weight:normal!important;
    }
</style>

<div class="container">
    <div class="row" style="padding-top:20px; padding-left:15px;">
        <a title="Click here to view Reporting dashboard" href="/project-management/reporting-dashboard/"><button class="btn btn-outline-primary">Reporting Dashboard <i class="fas fa-chart-bar mr-1"></i></button></a>
        <a title="Click here to view more charts" class="pl-2" href="{% url 'more-charts' %}"><button class="active btn btn-outline-primary">More Charts <i class="fas fa-chart-pie mr-1"></i></button></a>
    </div>
    <hr class="mb-3 mt-3">

    <div class="row">
        <section class="col-lg-6 connectedSortable">
            <div class="card item-card border-secondary">
                <div class="card-header border-secondary">
                    <h5 class="card-title text-secondary">
                        <i class="fas fa-chart-bar mr-1"></i>
                        Total tasks by project
                    </h5>
                </div>
                <div class="card-body">
                    <figure class="tab-content p-0">
                        <figure class="highcharts-figure">
                            <div id="total-tasks-canvas" style="height: 400px;"></div>
                        </figure>
                    </figure>
                </div>
            </div>
        </section>

        <section class="col-lg-6 connectedSortable">
            <div class="card item-card border-secondary">
                <div class="card-header border-secondary">
                    <h5 class="card-title text-secondary">
                        <i class="fas fa-chart-pie mr-1"></i>
                        Projects by project status
                    </h5>
                </div>
                <div class="card-body">
                    <figure class="tab-content p-0">
                        <figure class="highcharts-figure">
                            <div class="chart" id="project-status-canvas" style="height: 400px;"></div>
                        </figure>
                    </figure>
                </div>
            </div>
        </section>
    </div>

    <div class="row pt-3">
        <section class="col-lg-6 connectedSortable">
            <div class="card item-card border-secondary">
                <div class="card-header border-secondary">
                    <h5 class="card-title text-secondary">
                        <i class="far fa-chart-bar mr-1"></i>
                        Total tasks by assignee
                    </h5>
                </div>
                <div class="card-body">
                    <figure class="tab-content p-0">
                        <figure class="highcharts-figure">
                            <div id="task-assignee-canvas" style="height: 400px;"></div>
                        </figure>
                    </figure>
                </div>
            </div>
        </section>

        <section class="col-lg-6 connectedSortable">
            <div class="card item-card border-secondary">
                <div class="card-header border-secondary">
                    <h5 class="card-title text-secondary">
                        <i class="far fa-chart-bar mr-1"></i>
                        Upcoming tasks by assignee this week
                    </h5>
                </div>
                <div class="card-body">
                    <figure class="tab-content p-0">
                        <figure class="highcharts-figure">
                            <div id="tasks-assignee-this-week-canvas" style="height: 400px;"></div>
                        </figure>
                    </figure>
                </div>
            </div>
        </section>
    </div>


</div>

{% endblock %}

{% block extracode %}



{% endblock %}

{% block extrajs %}

<!-- Highcharts Core -->
<script src="{% static 'highcharts/highcharts.js' %}"></script>

<!-- Highstock -->
<script src="{% static 'highcharts/highstock.js' %}"></script>

<!-- Highcharts More -->
<script src="{% static 'highcharts/highcharts-more.js' %}"></script>

<!-- Dumbbell -->
<script src="{% static 'highcharts/dumbbell.js' %}"></script>

<!-- Lollipop -->
<script src="{% static 'highcharts/lollipop.js' %}"></script>

<!-- 3D -->
<script src="{% static 'highcharts/highcharts-3d.js' %}"></script>

<!-- Exporting -->
<script src="{% static 'highcharts/exporting.js' %}"></script>

<!-- Export Data -->
<script src="{% static 'highcharts/export-data.js' %}"></script>

<!-- Accessibility -->
<script src="{% static 'highcharts/accessibility.js' %}"></script>

<script>
    const project_labels_list = {{ project_labels|safe }};
    const total_tasks_data_list = {{ total_tasks_data|safe }};
    const project_data = {{ project_data_list|safe }};
    const task_assignee_labels = {{ task_assignee_labels_list|safe }};
    const task_assignee_data = {{ task_assignee_data_list|safe }};
    const this_week_task_assignee_labels = {{ this_week_task_assignee_labels_list|safe }};
    const this_week_task_assignee_data = {{ this_week_task_assignee_data_list|safe }};
</script>

<script src="{% static 'project_management/js/more_charts.js' %}?version=1" type="text/javascript"></script>
{% endblock %}
