		// added new code related to update parent progress automatically
		gantt.config.auto_types = true;
		gantt.templates.progress_text = function (start, end, task) {
			return `<span title='Task progress in percentage(%)' style='text-align:left; padding-left: 5px;'>${Math.round(task.progress * 100)}%</span>`;
		};


		gantt.init("gantt_here");
		gantt.load("/project-management/data/", "json");


		const csrftoken = document.querySelector('[name=csrfmiddlewaretoken]').value;
		gantt.createDataProcessor(function(entity, action, data, id){
			console.log("data:->",data);
			data["project"] = project_id;
		  	switch (action) {
				case "create":
			  		return gantt.ajax.post({
				headers: {
				  "Content-Type": "application/json",
				  'X-CSRFToken': csrftoken
				},
				url: "/project-management/data/"+entity,
				data: JSON.stringify(data)
			});
			break;
			case "update":
			  	return gantt.ajax.put({
					headers: {
				  	"Content-Type": "application/json",
				  	'X-CSRFToken': csrftoken,
					},
				url: "/project-management/data/"+entity+"/"+data.id,
				data: JSON.stringify(data),
			});
			break;
			case "delete":
			  	return gantt.ajax.del({
					headers: {
					"Content-Type": "application/json",
				  	'X-CSRFToken': csrftoken,
				},
					url: "/project-management/data/"+entity+"/"+data.id,
					data: JSON.stringify(data)
				});
				break;
		  	}
		});

		// added new code related to update parent progress automatically

		gantt.attachEvent("onAfterTaskUpdate", function(id, task){

			if (task.parent == 0) {
				return;
			}

			var parentTask = gantt.getTask(task.parent);

			var childs = gantt.getChildren(parentTask.id);
			var totProgress = 0;

			var tempTask;
			for (i = 0; i < childs.length; i++) {
				tempTask = gantt.getTask(childs[i]);
				totProgress += parseFloat(tempTask.progress);
			}

			parentTask.progress = (totProgress / childs.length).toFixed(2);
			gantt.updateTask(parentTask.id);
		});

		gantt.attachEvent("onAfterTaskAdd", function (id, task) {

			window.location.reload();

			if (task.parent == 0) {
				return;
			}

			var parentTask = gantt.getTask(task.parent);

			var childs = gantt.getChildren(parentTask.id);
			var totProgress = 0;

			var tempTask;
			for (i = 0; i < childs.length; i++) {
				tempTask = gantt.getTask(childs[i]);
				totProgress += parseFloat(tempTask.progress);
			}

			parentTask.progress = (totProgress / childs.length).toFixed(2);
			gantt.updateTask(parentTask.id);
		});

		gantt.attachEvent("onAfterTaskDelete", function (id, task) {
			if (task.parent) {
				const siblings = gantt.getChildren(task.parent);
				if (siblings.length) {
					parentProgress(siblings[0])
					gantt.updateTask(siblings[0]);
				}
			}
		});

		function parentProgress(id) {
			gantt.eachParent(function (task) {
				const children = gantt.getChildren(task.id);
				let childProgress = 0;
				for (let i = 0; i < children.length; i++) {
					const child = gantt.getTask(children[i])
					childProgress += parseFloat(child.progress).toFixed(2);
				}
				task.progress = (childProgress / children.length).toFixed(2);
			}, id)
			gantt.render();
		}

	</script>
