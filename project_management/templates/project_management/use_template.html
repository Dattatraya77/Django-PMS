{% extends "layout1.html" %}
{% load static %}
{% load tz %}
{% block content %}
<style>
    div.scroll {
        margin:4px, 4px;
        padding:4px;
        background-color: steel;
        max-height: 200px;
        overflow-x: hidden;
        overflow-y: auto;
        text-align:justify;
    }
    .select2-container {
        min-width: 445px;
    }
    .select2-results__options{
        font-size:14px !important;
    }
    .select2-results__placeholders{
        font-size:11px !important;
    }
    .select2-container--default.select2-container--disabled .select2-selection--multiple {
        background-color: #d0ffd0;
    }
    label {
        margin-bottom:0.2rem;
    }
</style>

<div class="container">
    <div class="d-flex justify-content-center">
        <form action="{% url 'use-template' %}" method="post" id="useTemplateForm">
            {% csrf_token %}
            <div class="modal fade" id="useTemplateModal" tabindex="-1" role="dialog" data-backdrop="static" aria-labelledby="useTemplateModalTitle" aria-hidden="true">
                <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable" role="document">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title" id="useTemplateModalTitle">Project details</h5>
                        </div>
                        <div class="modal-body">

                            <div class="row">
                                <div class="col-lg-12">
                                    <div class="form-group">
                                        <label for="projectName">Project name:</label>
                                        <input type="text" id="projectName" name="projectName" class="form-control" required>
                                    </div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-lg-12">
                                    <div class="form-group">
                                        <label for="projectDescription">Project description:</label>
                                        <textarea name="projectDescription" id="projectDescription" cols="30" rows="5" class="form-control"></textarea>
                                    </div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-12">
                                    <div class="form-group">
                                    {% if proj_groups %}
                                        <label class="">Project groups:</label>
                                        <div class="scroll form-group">
                                            <select multiple class="use-template-group-select" name="use_template_group_select">
                                                {% for group in proj_groups %}
                                                    <option value="{{ group.name }}" class="form-control">{{ group.name }}</option>
                                                {% endfor %}
                                            </select>
                                        </div>
                                    {% endif %}
                                    </div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-12">
                                    <div class="form-group">
                                    {% if proj_template %}
                                        <label class="">Library template(s):</label>
                                        <div class="scroll form-group">
                                            <select required class="library-template-select" name="library_template_select">
                                                <option id="-1" value="">Click here to select options.</option>
                                                {% for temp in proj_template %}
                                                    <option value="{{ temp.proj_temp_id }}" class="form-control">{{ temp.proj_temp_title }}</option>
                                                {% endfor %}
                                            </select>
                                        </div>
                                    {% endif %}
                                    </div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6">
                                    <button type="submit" class="btn btn-block btn-md btn-primary">Save</button>
                                </div>
                                <div class="col-md-6">
                                    <button type="button" onclick="location.href='/project-management/create-new-project/'" class="btn btn-block btn-md btn-secondary" title="Back to create project">Cancel</button>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>

{% endblock %}
{% block extracode %}
    <script>
    $(document).ready(function() {
        $("#useTemplateModal").modal("show");

        $(".use-template-group-select").select2({
            placeholder: "Click here to select options.",
            closeOnSelect: true,
            tags: false,
            allowClear: true,
            multiple: true,
            tokenSeparators: ['/',',',';'," "],
        });

        $(".library-template-select").select2({
            placeholder: "Click here to select options.",
            closeOnSelect: true,
            tags: false,
            allowClear: true,
            multiple: false,
        });
    });

</script>
{% endblock %}

{% block extrajs %}

{% endblock %}
